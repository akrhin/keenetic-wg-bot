name: quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  GO_VERSION: '1.23'

jobs:
  prerequisites:
    name: Prerequisites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check source structure
        run: |
          echo "🔍 Проверка структуры исходников..."
          MISSING=0
          for f in \
            cmd/wg-bot/main.go \
            internal/bot/bot.go \
            internal/config/config.go \
            internal/wireguard/wg.go \
            internal/wol/wol.go \
            internal/scheduler/timer.go; do
            if [ ! -f "$f" ]; then
              echo "❌ MISSING: $f"
              MISSING=$((MISSING+1))
            else
              echo "✅ $f"
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "❌ $MISSING source files missing!"
            exit 1
          fi
          echo "✅ All source files present"

  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: gosec
        uses: securego/gosec@master
        with:
          args: ./...

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: go vet
        run: go vet ./...
      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
           go-version-input: ${{ env.GO_VERSION }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: go test
        run: go test -v -count=1 -race ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [prerequisites, lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build amd64 (smoke test)
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o wg-bot-amd64 ./cmd/wg-bot/

      - name: Build mipsle (Keenetic)
        run: GOOS=linux GOARCH=mipsle GOMIPS=softfloat go build -ldflags="-s -w" -o wg-bot-mipsle ./cmd/wg-bot/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wg-bot-binaries
          path: |
            wg-bot-amd64
            wg-bot-mipsle

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: wg-bot-binaries

      - name: Build release archive
        run: |
          chmod +x wg-bot-mipsle
          cp wg-bot-mipsle wg-bot
          tar czf wg-bot-mipsle.tar.gz \
            wg-bot \
            install.sh \
            config.toml.example

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: wg-bot-mipsle.tar.gz
          generate_release_notes: true
