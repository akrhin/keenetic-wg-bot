name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  GO_VERSION: '1.25'

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: gosec
        uses: securego/gosec@master
        with:
          args: ./...

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: go test
        run: go test -v -count=1 -race ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build amd64
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o wg-bot-amd64 ./cmd/wg-bot/

      - name: Build mipsle (Keenetic)
        run: GOOS=linux GOARCH=mipsle GOMIPS=softfloat go build -ldflags="-s -w" -o wg-bot-mipsle ./cmd/wg-bot/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wg-bot-binaries
          path: |
            wg-bot-amd64
            wg-bot-mipsle

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: wg-bot-binaries

      - name: Build release archive
        run: |
          chmod +x wg-bot-mipsle
          cp wg-bot-mipsle wg-bot
          tar czf wg-bot-mipsle.tar.gz \
            wg-bot \
            install.sh \
            config.toml.example

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: wg-bot-mipsle.tar.gz
          generate_release_notes: true
